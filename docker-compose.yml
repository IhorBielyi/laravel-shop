networks:
  app_network:

volumes:
  database_volume:
    driver: local

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app:/var/www:ro
    depends_on:
      - php
    networks:
      - app_network

  php:
    build:
      context: ./php
    volumes:
      - ./app:/var/www
    networks:
      - app_network

  database:
    image: mysql:8.0
    restart: always
    ports:
      - "33061:3306"
    volumes:
      - "database_volume:/var/lib/mysql"
    environment:
        MYSQL_ROOT_PASSWORD: root
        MYSQL_DATABASE: db_shop
        MYSQL_USER: user
        MYSQL_PASSWORD: shop
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app_network